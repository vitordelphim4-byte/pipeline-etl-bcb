name: Pipeline ETL Indicadores BCB

on:
  schedule:
    # 21:00 UTC = 18:00 horário de Brasília (BRT = UTC-3, sem horário de verão desde 2019).
    # Roda após o fechamento do câmbio (PTAX) e a divulgação diária do SGS.
    - cron: "0 21 * * *"
  workflow_dispatch: # permite disparo manual pela aba Actions do GitHub

permissions:
  contents: write # necessário para commitar o CSV atualizado de volta no repositório

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          # mesma versão usada em desenvolvimento local (requirements.txt tem wheels específicas dela)
          python-version: "3.14"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline ETL
        run: python main.py

      - name: Commitar snapshot CSV atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indicadores.csv
          git diff --staged --quiet && echo "Sem mudanças no CSV, nada a commitar." || git commit -m "chore: atualiza snapshot de indicadores [skip ci]"
          git push
