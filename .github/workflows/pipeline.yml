name: Pipeline ETL População IBGE

on:
  schedule:
    # Todo dia 1 do mês, 12:00 UTC. Dado é anual (IBGE publica ~1x/ano) — cron
    # mensal já dá folga de sobra pra pegar a estimativa nova assim que sair.
    - cron: "0 12 1 * *"
  workflow_dispatch: # permite disparo manual pela aba Actions do GitHub

permissions:
  contents: write # necessário para commitar o CSV atualizado de volta no repositório

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          # mesma versão usada em desenvolvimento local (requirements.txt tem wheels específicas dela)
          python-version: "3.14"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar pipeline ETL
        run: python main.py

      - name: Commitar snapshot CSV atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/populacao.csv
          git diff --staged --quiet && echo "Sem mudanças no CSV, nada a commitar." || git commit -m "chore: atualiza snapshot de população [skip ci]"
          git push
